name: Crawl and Analyze Stock News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Stock Agent Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      shell: pwsh
      run: |
        ./run_agent.ps1 -OneShot

    - name: Commit & Push data changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update analysis data [skip ci]" && git push)
